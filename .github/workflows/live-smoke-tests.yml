name: Live Smoke Tests
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test:
          - "page loads with the correct name and title"
          - "sidebar shows a photo and a LinkedIn link"
          - "experience and education sections are present"
          - "dark mode toggle switches the theme"
          - "download CV link points to a PDF"
          - "external links open safely in a new tab"
          - "no browser console errors on load"
          - "PhD dissertation link is reachable"
    name: ${{ matrix.test }}
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm exec playwright test --project=chromium --grep "${{ matrix.test }}"
        env:
          BASE_URL: https://akosmakra.github.io

  notify-on-failure:
    needs: test
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Find which test(s) failed
        id: failed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NAMES=$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs" --paginate \
            --jq '.jobs[] | select(.conclusion=="failure") | .name' | paste -sd ', ')
          echo "names=${NAMES:-unknown}" >> "$GITHUB_OUTPUT"
      - name: Notify Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          FAILED_TESTS: ${{ steps.failed.outputs.names }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          PAYLOAD=$(jq -n --arg content "🔴 Live smoke test failure on akosmakra.github.io — failed: ${FAILED_TESTS}
          ${RUN_URL}" '{content: $content}')
          curl -sf -X POST "$DISCORD_WEBHOOK_URL" -H "Content-Type: application/json" -d "$PAYLOAD"
