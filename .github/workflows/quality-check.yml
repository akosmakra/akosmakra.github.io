name: Quality Check
on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm run quality-check
        env:
          SITE_URL: https://akosmakra.github.io
          GITHUB_SHA: ${{ github.sha }}
      - name: Commit updated status
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/status.json
          git diff --cached --quiet && echo "changed=false" >> "$GITHUB_ENV" || { git commit -m "chore: update site status from scheduled quality check" && git push && echo "changed=true" >> "$GITHUB_ENV"; }
      - name: Trigger deploy
        if: env.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml
